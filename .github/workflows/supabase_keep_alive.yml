name: Supabase Keep Alive

on:
  schedule:
    # 3日に1回、日本時間 06:30 (UTC 21:30) に実行
    # 1日, 4日, 7日... のように3日おきに実行されます
    - cron: '30 21 */3 * *'
  workflow_dispatch: # 手動実行ボタンも残しておきます

jobs:
  supabase_ping:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Send Ping to Supabase API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/holdings?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Keep GitHub Actions alive
        uses: liskin/gh-workflow-keepalive@v1